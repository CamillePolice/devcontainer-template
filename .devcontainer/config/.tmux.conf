# ~/.tmux.conf

# ============================================
# GÉNÉRAL
# ============================================

# Activer la souris
set -g mouse on

# Numérotation des fenêtres/panes à partir de 1
set -g base-index 1
setw -g pane-base-index 1

# Renumérote automatiquement les fenêtres
set -g renumber-windows on

# Historique de 10000 lignes
set -g history-limit 10000

# ============================================
# APPARENCE
# ============================================

# Support 256 couleurs
set -g default-terminal "screen-256color"

# Barre de statut
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour234 fg=colour137'
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Fenêtre active
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

# Autres fenêtres
setw -g window-status-style 'fg=colour138 bg=colour235'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# Bordures des panes
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour81'

# Messages
set -g message-style 'fg=colour232 bg=colour166 bold'

# ============================================
# FONCTIONNALITÉS AVANCÉES
# ============================================

# Mode vi pour la copie
setw -g mode-keys vi

# Pas de délai pour ESC (important pour Vim/Neovim)
set -sg escape-time 0

# Focus events (utile pour les éditeurs)
set -g focus-events on

# Affichage automatique des panes
setw -g automatic-rename on
set -g set-titles on

# ============================================
# TPM (Tmux Plugin Manager) + plugins
# ============================================
# Install plugins: run ~/.tmux/plugins/tpm/bin/install_plugins
# Requires: xclip or xsel (Linux) for tmux-yank.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'
