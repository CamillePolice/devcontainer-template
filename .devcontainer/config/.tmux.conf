# ~/.tmux.conf
# ============================================
# GÉNÉRAL
# ============================================

# Prefix : on garde Ctrl-b (Ctrl-a conflit avec readline)
# Si tu veux changer : décommente les 3 lignes suivantes
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Reload config avec prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Activer la souris
set -g mouse on

# Numérotation des fenêtres/panes à partir de 1
set -g base-index 1
setw -g pane-base-index 1

# Renumérote automatiquement les fenêtres
set -g renumber-windows on

# Historique de 10000 lignes
set -g history-limit 10000

# Pas de délai pour ESC (important pour Vim/Neovim)
set -sg escape-time 0

# Focus events (utile pour les éditeurs)
set -g focus-events on

# Affichage automatique des panes
setw -g automatic-rename on
set -g set-titles on

# Support 256 couleurs + true color
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Clipboard système natif
set -s set-clipboard on

# ============================================
# NAVIGATION PANES (vim-tmux-navigator)
# ============================================
# Nécessite le plugin christoomey/vim-tmux-navigator dans Neovim
# Smart pane switching avec awareness des splits Vim/Neovim

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n 'C-j' if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n 'C-k' if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n 'C-l' if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ============================================
# MODE VI (copie)
# ============================================

setw -g mode-keys vi

# v  → début de sélection (comme Visual mode)
# V  → sélection ligne entière
# y  → copie dans le clipboard système
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'

# ============================================
# TMUX-SESSIONIZER (fzf session switcher)
# ============================================
# Prérequis : fzf installé + script tmux-sessionizer dans ~/.local/bin/
# Installation du script : voir https://github.com/micahkepe/dotfiles/blob/main/tmux/tmux-sessionizer.sh
# chmod +x tmux-sessionizer && cp tmux-sessionizer ~/.local/bin/

# prefix + f → fuzzy-find et switch/créer une session
bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# prefix + Ctrl-j → popup fzf pour switcher entre sessions existantes
bind C-j display-popup -E "~/.local/bin/session-fzf.sh"

# ============================================
# POPUP SPOTIFY (optionnel)
# ============================================
# Prérequis : spotify_player installé (cargo install spotify_player)
# prefix + Ctrl-p → ouvre/reattache le player Spotify dans un popup

bind C-p run-shell '
if [ "#{session_name}" = "spotify" ]; then
  tmux display-message "Already in spotify session"
else
  tmux has-session -t spotify 2>/dev/null || tmux new-session -d -s spotify spotify_player
  tmux display-popup -E "tmux attach -t spotify"
fi'

# ============================================
# TPM (Tmux Plugin Manager) + plugins
# ============================================
# Installation TPM (une seule fois) :
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Installation plugins :
#   ~/.tmux/plugins/tpm/bin/install_plugins
# Ou dans tmux : prefix + I

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Auto-restore sessions au démarrage de tmux
set -g @continuum-restore 'on'

# ============================================
# APPARENCE — Catppuccin Mocha
# ============================================
# Installation Catppuccin (une seule fois, hors TPM pour éviter les conflits) :
#   mkdir -p ~/.config/tmux/plugins/catppuccin
#   git clone -b v2.1.3 https://github.com/catppuccin/tmux.git \
#     ~/.config/tmux/plugins/catppuccin/tmux

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Chargement Catppuccin (avant la config de la status bar)
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status bar
set -g status-position bottom
set -g status-right-length 100
set -g status-left-length 100

set -g status-left "#{E:@catppuccin_status_user}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ============================================
# INITIALISATION TPM (toujours en dernier !)
# ============================================
run '~/.tmux/plugins/tpm/tpm'
